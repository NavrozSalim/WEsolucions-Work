# Production — Nginx + Gunicorn, static frontend from ./frontend/dist
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Build frontend: cd frontend && VITE_API_URL=/api/v1 npm run build
#
# Optional registry deploy: set BACKEND_IMAGE=youruser/saas-store-sync-backend:tag
# then: docker compose ... pull && up -d (skip --build)



x-backend-image: &backend-image
  image: ${BACKEND_IMAGE:-saas-store-sync-backend}
  build:
    context: ./backend
    dockerfile: Dockerfile

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "4"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    stop_grace_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    <<: *backend-image
    command: gunicorn core.wsgi:application -c config/gunicorn.conf.py
    init: true
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DEBUG=False
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://${DOMAIN_NAME}}
      - FRONTEND_URL=${FRONTEND_URL:-https://${DOMAIN_NAME}}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - CATALOG_ALLOW_INLINE_STORE_WIDE_SCRAPE=${CATALOG_ALLOW_INLINE_STORE_WIDE_SCRAPE:-}
      # HEB Selenium scraper (optional; set in .env.prod)
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_URLS=${PROXY_URLS:-}
      - COSTCO_AU_PROXY_URL=${COSTCO_AU_PROXY_URL:-}
      - COSTCO_AU_PROXY_URLS=${COSTCO_AU_PROXY_URLS:-}
      - PROXY_ENDPOINTS=${PROXY_ENDPOINTS:-}
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-}
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
      - PROXY_SCHEME=${PROXY_SCHEME:-http}
      - HEB_USE_APIFY=${HEB_USE_APIFY:-0}
      - HEB_APIFY_TOKEN=${HEB_APIFY_TOKEN:-}
      - HEB_APIFY_ACTOR_ID=${HEB_APIFY_ACTOR_ID:-}
      - HEB_APIFY_TIMEOUT_SEC=${HEB_APIFY_TIMEOUT_SEC:-90}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; r=urllib.request.Request(\"http://127.0.0.1:8000/health/\", headers={\"Host\":\"backend\"}); urllib.request.urlopen(r, timeout=8)"',
        ]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./backend/config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    stop_grace_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  celery_worker:
    <<: *backend-image
    command: celery -A core worker -l info --concurrency=1 --prefetch-multiplier=1 -O fair
    init: true
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Django settings (same as backend — Celery imports core.settings on startup)
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DEBUG=False
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://${DOMAIN_NAME}}
      - FRONTEND_URL=${FRONTEND_URL:-https://${DOMAIN_NAME}}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - CATALOG_ALLOW_INLINE_STORE_WIDE_SCRAPE=${CATALOG_ALLOW_INLINE_STORE_WIDE_SCRAPE:-}
      # eBay: Selenium-first on VPS; set EBAY_HTTP_FIRST=1 only on clean/residential IPs
      - EBAY_HTTP_FIRST=${EBAY_HTTP_FIRST:-0}
      # HEB Selenium scraper (optional; set in .env.prod)
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_URLS=${PROXY_URLS:-}
      - COSTCO_AU_PROXY_URL=${COSTCO_AU_PROXY_URL:-}
      - COSTCO_AU_PROXY_URLS=${COSTCO_AU_PROXY_URLS:-}
      - PROXY_ENDPOINTS=${PROXY_ENDPOINTS:-}
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-}
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
      - PROXY_SCHEME=${PROXY_SCHEME:-http}
      - HEB_USE_APIFY=${HEB_USE_APIFY:-0}
      - HEB_APIFY_TOKEN=${HEB_APIFY_TOKEN:-}
      - HEB_APIFY_ACTOR_ID=${HEB_APIFY_ACTOR_ID:-}
      - HEB_APIFY_TIMEOUT_SEC=${HEB_APIFY_TIMEOUT_SEC:-90}
      - COSTCO_AU_MIN_REQUEST_GAP_SEC=${COSTCO_AU_MIN_REQUEST_GAP_SEC:-20}
      - COSTCO_AU_LOCK_WAIT_SEC=${COSTCO_AU_LOCK_WAIT_SEC:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    stop_grace_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  celery_beat:
    <<: *backend-image
    command: celery -A core beat -l info
    init: true
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DEBUG=False
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://${DOMAIN_NAME}}
      - FRONTEND_URL=${FRONTEND_URL:-https://${DOMAIN_NAME}}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - CATALOG_ALLOW_INLINE_STORE_WIDE_SCRAPE=${CATALOG_ALLOW_INLINE_STORE_WIDE_SCRAPE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
  redisdata:
