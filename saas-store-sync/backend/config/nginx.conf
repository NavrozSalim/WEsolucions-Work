# Full main config for Docker (mounted as /etc/nginx/nginx.conf).
# HTTP + HTTPS — certs from host /etc/letsencrypt mounted read-only.
#
# Replace 173.212.218.31 with your VPS IPv4 if different.
# Issue/renew certs on the host (certbot), then recreate nginx.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream django_backend {
        server backend:8000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name wesolucions.com www.wesolucions.com 173.212.218.31;

        include /etc/nginx/nginx-app-server.inc;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name wesolucions.com www.wesolucions.com 173.212.218.31;

        ssl_certificate     /etc/letsencrypt/live/wesolucions.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wesolucions.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        include /etc/nginx/nginx-app-server.inc;
    }
}
