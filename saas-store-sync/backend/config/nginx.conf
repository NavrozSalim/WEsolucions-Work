# Full main config for Docker (mounted as /etc/nginx/nginx.conf).
# HTTP on port 80 — SPA + reverse proxy to Gunicorn.
#
# Replace 173.212.218.31 with your VPS IPv4 if different.
# After Let's Encrypt: add a second server { listen 443 ssl; ... } or use
# backend/config/nginx.conf.ssl.example if you maintain one.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream django_backend {
        server backend:8000;
    }

    server {
        listen 80;
        listen [::]:80;
        # Apex, www, and raw IP so Host: 173.x works (Django ALLOWED_HOSTS must match)
        server_name wesolucions.com www.wesolucions.com 173.212.218.31;

        client_max_body_size 10M;

        location ^~ /api/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 120s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location ^~ /admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /static/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }

        location ^~ /health/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }

        location ^~ /ready/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }

        location ^~ /metrics/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
